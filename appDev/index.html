<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/graph.css">
    <title>Document</title>
</head>
<body>
    <div id="overlay" style="display: flex; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); z-index: 2;">
        <h1>Loading...</h1>
    </div>
    <div id="tools" style="position: absolute; top: 10px; left: 10px; z-index: 1; display: flex; gap: 10px; align-items: center;">
        <button id="home" style="padding: 5px; font-size: 16px;"><img src="/src/assets/home.svg" alt="Home" width="30px" height="30px"></button>
        <input list="suggestions" id="search-input" placeholder="Search nodes..." style="padding: 5px; font-size: 16px;">
        <datalist id="suggestions"></datalist>
    </div>
    <div id="container" style="width: 100vw; height: 100vh; background: white"></div>
    <div id="additional-tools" style="position: absolute; bottom: 10px; left: 10px; z-index: 1; display: flex; gap: 10px; align-items: center;">
        <button id="about" style="padding: 5px; font-size: 16px;" popovertarget="about-dialog"><img src="/src/assets/info.svg" alt="About" width="30px" height="30px"></button>
        <select name="language" id="language" style="padding: 5px; font-size: 16px;">
        </select>
    </div>
    <dialog id="about-dialog" popover style="border-radius: 10px; width: 25%; height: 40%; padding: 20px;">
        <h1>About</h1>
        <p>You can start a tour at any time by clicking the "Tour" button.</p>
        <button id="start-tour" style="padding: 5px; font-size: 16px;" popovertarget="about-dialog" popovertargetaction="hide"><img src="/src/assets/tour.svg" alt="Tour" width="30px" height="30px"></button>
        <p>For how to contribute to Wikidata, please visit <a href="guide.html" target="_blank">the guide</a>.</p>
        <button popovertarget="about-dialog" popovertargetaction="hide" style="position: absolute; bottom: 10px; right: 10px;"><img src="/src/assets/close.svg" alt="Close" width="30px" height="30px"></button>
    </dialog>
    </div>
    <div id="info-panel" style="position: absolute; top: 0px; right: 0px; height: 100%; width: 30%; z-index: 1; padding: 5px; font-size: 16px; background: white; border: 1px solid #ccc;" hidden>
        <button id="close-info" style="position: absolute; top: 5px; right: 5px; padding: 5px; font-size: 16px;"><img src="/src/assets/close.svg" alt="Close" width="30px" height="30px"></button>
        <iframe id="info-frame" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
    <script type="module" src="/src/graph.ts"></script>
</body>
</html>
